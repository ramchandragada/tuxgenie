name: Auto Tag on Version Bump

# Step 1 of 2: Fires on push to main, reads __version__ from tuxgenie.py,
# and pushes a git tag if one doesn't exist yet.
# That tag push triggers release.yml (Step 2) which builds and publishes.

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tuxgenie.py
        id: version
        run: |
          VER=$(python3 -c "
          import re, sys
          m = re.search(r'__version__\s*=\s*[\"\']([\d.]+)[\"\'\ ]', open('tuxgenie.py').read())
          if not m:
              sys.exit('Could not find __version__ in tuxgenie.py')
          print(m.group(1))
          ")
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VER"    >> "$GITHUB_OUTPUT"
          echo "Detected version: $VER"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG not found — will create it."
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.TAG }}" -m "TuxGenie ${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"
          echo "Tag ${{ steps.version.outputs.TAG }} pushed — release.yml will now build and publish."
