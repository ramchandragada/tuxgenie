name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: TUXGENIE_VERSION=${{ steps.version.outputs.VERSION }} python3 create_deb.py
        # create_deb.py reads TUXGENIE_VERSION env var for the package version

      - name: Build PyPI wheel + sdist
        run: python -m build --sdist --wheel

      - name: Verify PyPI artifacts
        run: twine check dist/*.whl dist/*.tar.gz

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*.whl dist/*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TuxGenie v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Install

            **Debian / Ubuntu / Linux Mint (.deb)**
            ```bash
            sudo dpkg -i tuxgenie_${{ steps.version.outputs.VERSION }}_all.deb
            ```

            **Any Linux distro (pip)**
            ```bash
            pip install tuxgenie
            ```

            **Set your API key**
            ```bash
            export ANTHROPIC_API_KEY="sk-ant-..."
            ```
            Get a key at https://console.anthropic.com

            **Run**
            ```bash
            tuxgenie
            ```
          files: |
            tuxgenie_${{ steps.version.outputs.VERSION }}_all.deb
            install.sh
            dist/tuxgenie-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            dist/tuxgenie-${{ steps.version.outputs.VERSION }}.tar.gz
          draft: false
          prerelease: false
