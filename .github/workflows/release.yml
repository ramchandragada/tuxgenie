name: Release

# Fires on every push to main.
# Reads __version__ from tuxgenie.py. If no release exists for that version,
# builds the .deb + wheel and publishes everything in one workflow run.
# softprops/action-gh-release@v2 creates the tag itself — no second trigger needed.

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from tuxgenie.py
        id: ver
        run: |
          VER=$(python3 -c "
          import re, sys
          m = re.search(r'__version__\s*=\s*[\"\']([\d.]+)[\"\']', open('tuxgenie.py').read())
          sys.exit('__version__ not found') if not m else print(m.group(1))
          ")
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VER"    >> "$GITHUB_OUTPUT"
          echo "Detected: $VER"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.VERSION }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.VERSION }} already released — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.VERSION }} is new — building release."
          fi

      - name: Install build tools
        if: steps.check.outputs.exists == 'false'
        run: pip install build twine

      - name: Build .deb
        if: steps.check.outputs.exists == 'false'
        run: TUXGENIE_VERSION=${{ steps.ver.outputs.VERSION }} python3 create_deb.py

      - name: Build PyPI wheel + sdist
        if: steps.check.outputs.exists == 'false'
        run: python -m build --sdist --wheel

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine check dist/*.whl dist/*.tar.gz && twine upload dist/*.whl dist/*.tar.gz
        continue-on-error: true

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "TuxGenie v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## Install

            **Debian / Ubuntu / Linux Mint (.deb)**
            ```bash
            sudo dpkg -i tuxgenie_${{ steps.ver.outputs.VERSION }}_all.deb
            ```

            **Any Linux distro (pip)**
            ```bash
            pip install --upgrade tuxgenie
            ```

            **Set your API key**
            ```bash
            export ANTHROPIC_API_KEY="sk-ant-..."
            ```
            Get a key at https://console.anthropic.com

            **Run**
            ```bash
            tuxgenie
            ```
          files: |
            tuxgenie_${{ steps.ver.outputs.VERSION }}_all.deb
            install.sh
            dist/tuxgenie-${{ steps.ver.outputs.VERSION }}-py3-none-any.whl
            dist/tuxgenie-${{ steps.ver.outputs.VERSION }}.tar.gz
          draft: false
          prerelease: false

      # ── Auto-sync website version + tool count ──────────────────────────────
      # Runs on every push to main. Patches docs/index.html with the current
      # version from tuxgenie.py and the live tool count from the menu.
      # Commits back to main only if anything actually changed.
      - name: Sync website version and tool count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import re, subprocess, sys

          with open('tuxgenie.py') as f:
              src = f.read()

          # Read current version
          ver = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', src).group(1)

          # Count numbered menu tool items
          tool_count = len(re.findall(r'_item\("', src))

          with open('docs/index.html') as f:
              html = f.read()

          original = html

          # 1. Replace ALL vX.Y.Z version strings (all belong to TuxGenie in this file)
          html = re.sub(r'v\d+\.\d+\.\d+', f'v{ver}', html)

          # 2. Replace tool count before "built-in tools" (case-insensitive variants)
          html = re.sub(r'\b\d+(?= built-in tools)', str(tool_count), html)
          html = re.sub(r'\b\d+(?= Built-in Tools)', str(tool_count), html)

          # 3. Replace tool count in meta description
          html = re.sub(
              r'(\d+) built-in tools',
              f'{tool_count} built-in tools',
              html,
              flags=re.IGNORECASE
          )

          # 4. Update hero stat number (the big "29" badge)
          html = re.sub(
              r'(font-size:24px;font-weight:900[^>]*>)\d+(<)',
              rf'\g<1>{tool_count}\2',
              html
          )

          if html == original:
              print(f"Website already up to date (v{ver}, {tool_count} tools). Nothing to commit.")
              sys.exit(0)

          with open('docs/index.html', 'w') as f:
              f.write(html)

          print(f"Updated docs/index.html → v{ver}, {tool_count} tools")
          PYEOF

          # Commit only if something changed
          if git diff --quiet docs/index.html; then
            echo "No website changes to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/index.html
            git commit -m "chore: sync website to v${{ steps.ver.outputs.VERSION }} [skip ci]"
            git push origin main
          fi
